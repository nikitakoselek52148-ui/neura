<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>NEURA — нейросетевой ассистент</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #0a0a0f;
            min-height: 100vh;
            color: #ffffff;
            overflow: hidden;
        }

        /* Анимированный фон */
        .orb {
            position: fixed;
            width: 600px;
            height: 600px;
            border-radius: 50%;
            filter: blur(120px);
            z-index: -1;
        }

        .orb-1 {
            background: radial-gradient(circle, rgba(168,85,247,0.4) 0%, rgba(168,85,247,0) 70%);
            top: -200px;
            right: -200px;
            animation: float 20s infinite ease-in-out;
        }

        .orb-2 {
            background: radial-gradient(circle, rgba(236,72,153,0.3) 0%, rgba(236,72,153,0) 70%);
            bottom: -200px;
            left: -200px;
            animation: float 25s infinite ease-in-out reverse;
        }

        .orb-3 {
            background: radial-gradient(circle, rgba(6,182,212,0.2) 0%, rgba(6,182,212,0) 70%);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 800px;
            height: 800px;
            animation: pulse 15s infinite ease-in-out;
        }

        @keyframes float {
            0%, 100% { transform: translate(0, 0); }
            50% { transform: translate(50px, 50px); }
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.3; transform: translate(-50%, -50%) scale(1); }
            50% { opacity: 0.6; transform: translate(-50%, -50%) scale(1.1); }
        }

        .container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            max-width: 1400px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }

        /* Хедер */
        .header {
            padding: 20px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-icon {
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, #a855f7, #ec4899);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            box-shadow: 0 0 20px rgba(168,85,247,0.3);
            animation: glow 3s infinite;
        }

        @keyframes glow {
            0%, 100% { box-shadow: 0 0 20px rgba(168,85,247,0.3); }
            50% { box-shadow: 0 0 40px rgba(168,85,247,0.6); }
        }

        .logo h1 {
            font-size: 28px;
            font-weight: 800;
            background: linear-gradient(135deg, #ffffff, #a855f7);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .logo span {
            font-size: 12px;
            color: rgba(255,255,255,0.4);
            margin-left: 8px;
        }

        .status {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            background: rgba(255,255,255,0.03);
            border-radius: 40px;
            backdrop-filter: blur(10px);
            font-size: 13px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background: #22c55e;
            border-radius: 50%;
            animation: blink 2s infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        /* Основная область */
        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            padding: 20px 30px;
        }

        /* Приветствие (пока нет сообщений) */
        .welcome {
            text-align: center;
            margin-top: 60px;
            animation: fadeInUp 0.6s ease;
        }

        .welcome-icon {
            font-size: 80px;
            margin-bottom: 20px;
        }

        .welcome h2 {
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 12px;
            background: linear-gradient(135deg, #fff, #a855f7);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .welcome p {
            color: rgba(255,255,255,0.5);
            font-size: 16px;
        }

        /* Сетка фишек */
        .features {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 50px;
            flex-wrap: wrap;
        }

        .feature-card {
            background: rgba(255,255,255,0.03);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 20px;
            padding: 20px 25px;
            text-align: center;
            transition: all 0.3s;
            cursor: pointer;
        }

        .feature-card:hover {
            background: rgba(168,85,247,0.1);
            border-color: rgba(168,85,247,0.3);
            transform: translateY(-5px);
        }

        .feature-icon {
            font-size: 32px;
            margin-bottom: 12px;
        }

        .feature-title {
            font-weight: 600;
            margin-bottom: 8px;
        }

        .feature-desc {
            font-size: 12px;
            color: rgba(255,255,255,0.5);
        }

        /* Сообщения */
        .messages {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 16px;
            padding-right: 10px;
        }

        .messages::-webkit-scrollbar {
            width: 5px;
        }

        .messages::-webkit-scrollbar-track {
            background: rgba(255,255,255,0.05);
            border-radius: 10px;
        }

        .messages::-webkit-scrollbar-thumb {
            background: rgba(168,85,247,0.5);
            border-radius: 10px;
        }

        .message {
            display: flex;
            gap: 12px;
            animation: fadeInUp 0.3s ease;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.user {
            flex-direction: row-reverse;
        }

        .avatar {
            width: 40px;
            height: 40px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .bot .avatar {
            background: linear-gradient(135deg, #a855f7, #ec4899);
        }

        .user .avatar {
            background: rgba(255,255,255,0.1);
        }

        .message-content {
            max-width: 70%;
            padding: 12px 18px;
            border-radius: 20px;
            line-height: 1.5;
            font-size: 14px;
        }

        .bot .message-content {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.05);
            border-bottom-left-radius: 4px;
        }

        .user .message-content {
            background: linear-gradient(135deg, #a855f7, #ec4899);
            border-bottom-right-radius: 4px;
        }

        .download-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-top: 12px;
            padding: 8px 16px;
            background: #22c55e;
            border: none;
            border-radius: 40px;
            color: white;
            font-weight: 600;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .download-btn:hover {
            background: #16a34a;
            transform: scale(1.02);
        }

        .typing {
            display: flex;
            gap: 6px;
            padding: 12px 0;
        }

        .typing span {
            width: 8px;
            height: 8px;
            background: rgba(255,255,255,0.6);
            border-radius: 50%;
            animation: typingWave 1.4s infinite;
        }

        .typing span:nth-child(2) { animation-delay: 0.2s; }
        .typing span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes typingWave {
            0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
            30% { transform: translateY(-10px); opacity: 1; }
        }

        /* Инпут */
        .input-area {
            padding: 20px 0 10px;
            border-top: 1px solid rgba(255,255,255,0.05);
        }

        .input-container {
            display: flex;
            gap: 12px;
            background: rgba(255,255,255,0.03);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 60px;
            padding: 6px;
            transition: all 0.3s;
        }

        .input-container:focus-within {
            border-color: #a855f7;
            box-shadow: 0 0 20px rgba(168,85,247,0.2);
        }

        .input-container input {
            flex: 1;
            background: transparent;
            border: none;
            padding: 14px 20px;
            font-size: 15px;
            color: white;
            outline: none;
            font-family: 'Inter', sans-serif;
        }

        .input-container input::placeholder {
            color: rgba(255,255,255,0.3);
        }

        .input-container button {
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, #a855f7, #ec4899);
            border: none;
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.2s;
        }

        .input-container button:hover {
            transform: scale(1.05);
        }

        /* Адаптив */
        @media (max-width: 768px) {
            .header {
                padding: 15px 20px;
            }
            .main {
                padding: 15px 20px;
            }
            .logo h1 {
                font-size: 20px;
            }
            .logo-icon {
                width: 40px;
                height: 40px;
                font-size: 20px;
            }
            .message-content {
                max-width: 85%;
                font-size: 13px;
            }
            .welcome h2 {
                font-size: 24px;
            }
            .features {
                gap: 12px;
            }
            .feature-card {
                padding: 15px 20px;
            }
        }
    </style>
</head>
<body>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>

    <div class="container">
        <div class="header">
            <div class="logo">
                <div class="logo-icon">
                    <i class="fas fa-brain"></i>
                </div>
                <h1>NEURA <span>alpha</span></h1>
            </div>
            <div class="status">
                <div class="status-dot"></div>
                <span id="statusText">онлайн</span>
            </div>
        </div>

        <div class="main">
            <div class="messages" id="messages">
                <div class="welcome" id="welcomeScreen">
                    <div class="welcome-icon">
                        <i class="fas fa-robot"></i>
                    </div>
                    <h2>NEURA</h2>
                    <p>Ваш нейросетевой ассистент</p>
                    <div class="features">
                        <div class="feature-card" onclick="setSuggestion('Сделай документ про нейросети')">
                            <div class="feature-icon">📄</div>
                            <div class="feature-title">Создать документ</div>
                            <div class="feature-desc">Word с содержанием</div>
                        </div>
                        <div class="feature-card" onclick="setSuggestion('Сделай презентацию про искусственный интеллект')">
                            <div class="feature-icon">🎬</div>
                            <div class="feature-title">Создать презентацию</div>
                            <div class="feature-desc">PowerPoint со слайдами</div>
                        </div>
                        <div class="feature-card" onclick="setSuggestion('Что такое машинное обучение?')">
                            <div class="feature-icon">💬</div>
                            <div class="feature-title">Просто спросить</div>
                            <div class="feature-desc">Ответ на любой вопрос</div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="input-area">
                <div class="input-container">
                    <input type="text" id="userInput" placeholder="Напишите сообщение..." onkeypress="handleKeyPress(event)">
                    <button onclick="sendMessage()">
                        <i class="fas fa-arrow-up"></i>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = "https://neura-production-ad43.up.railway.app";
        let isFirstMessage = true;

        function handleKeyPress(event) {
            if (event.key === 'Enter') sendMessage();
        }

        function setSuggestion(text) {
            document.getElementById('userInput').value = text;
            sendMessage();
        }

        function hideWelcome() {
            const welcome = document.getElementById('welcomeScreen');
            if (welcome && isFirstMessage) {
                welcome.style.display = 'none';
                isFirstMessage = false;
            }
        }

        function addMessage(text, isUser, isDownload = false, downloadUrl = null, filename = null) {
            hideWelcome();
            const messagesDiv = document.getElementById('messages');
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${isUser ? 'user' : 'bot'}`;
            
            const avatar = document.createElement('div');
            avatar.className = 'avatar';
            avatar.innerHTML = isUser ? '<i class="fas fa-user"></i>' : '<i class="fas fa-brain"></i>';
            
            const contentDiv = document.createElement('div');
            contentDiv.className = 'message-content';
            
            if (isDownload && downloadUrl && filename) {
                contentDiv.innerHTML = `
                    ${text.replace(/\n/g, '<br>')}
                    <button class="download-btn" onclick="downloadFile('${downloadUrl}', '${filename}')">
                        <i class="fas fa-download"></i> Скачать файл
                    </button>
                `;
            } else {
                contentDiv.innerHTML = text.replace(/\n/g, '<br>');
            }
            
            messageDiv.appendChild(avatar);
            messageDiv.appendChild(contentDiv);
            messagesDiv.appendChild(messageDiv);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        function showTyping() {
            hideWelcome();
            const messagesDiv = document.getElementById('messages');
            const typingDiv = document.createElement('div');
            typingDiv.className = 'message bot';
            typingDiv.id = 'typingIndicator';
            typingDiv.innerHTML = `
                <div class="avatar"><i class="fas fa-brain"></i></div>
                <div class="message-content"><div class="typing"><span></span><span></span><span></span></div></div>
            `;
            messagesDiv.appendChild(typingDiv);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        function hideTyping() {
            const typing = document.getElementById('typingIndicator');
            if (typing) typing.remove();
        }

        function updateStatus(text, isError = false) {
            const statusSpan = document.getElementById('statusText');
            statusSpan.innerHTML = text;
            if (isError) {
                statusSpan.style.color = '#ef4444';
            } else {
                statusSpan.style.color = 'rgba(255,255,255,0.8)';
            }
        }

        async function sendMessage() {
            const input = document.getElementById('userInput');
            const text = input.value.trim();
            if (!text) return;
            
            addMessage(text, true);
            input.value = '';
            
            const lowerText = text.toLowerCase();
            const wantsDoc = /(сделай|создай|напиши|сгенерируй).*(документ|ворд|docx|word)/i.test(lowerText);
            const wantsPPT = /(сделай|создай|сгенерируй).*(презентацию|преза|pptx|powerpoint|слайды)/i.test(lowerText);
            
            let fileType = null;
            if (wantsDoc) fileType = "docx";
            else if (wantsPPT) fileType = "pptx";
            
            showTyping();
            updateStatus("🔄 Думаю...");
            
            try {
                if (fileType) {
                    updateStatus(`📝 Создаю ${fileType === "docx" ? "документ" : "презентацию"}...`);
                    
                    const response = await fetch(`${API_URL}/generate`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ text: text, file_type: fileType })
                    });
                    
                    if (!response.ok) {
                        const error = await response.json();
                        throw new Error(error.detail || "Ошибка создания файла");
                    }
                    
                    const blob = await response.blob();
                    const url = URL.createObjectURL(blob);
                    const filename = `${fileType === "docx" ? "document" : "presentation"}_${Date.now()}.${fileType}`;
                    
                    hideTyping();
                    const fileTypeName = fileType === "docx" ? "документ Word" : "презентацию PowerPoint";
                    addMessage(`✅ Готово! Я создал ${fileTypeName} по вашему запросу.`, false, true, url, filename);
                    updateStatus("✅ Файл готов");
                    
                } else {
                    updateStatus("💬 Думаю...");
                    
                    const response = await fetch(`${API_URL}/chat`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ text: text })
                    });
                    
                    if (!response.ok) throw new Error("Ошибка получения ответа");
                    
                    const data = await response.json();
                    hideTyping();
                    addMessage(data.response, false);
                    updateStatus("✅ Готов");
                }
            } catch (error) {
                console.error("Ошибка:", error);
                hideTyping();
                addMessage(`❌ Ошибка: ${error.message}. Проверьте подключение к серверу.`, false);
                updateStatus("❌ Ошибка", true);
            }
        }

        function downloadFile(url, filename) {
            const a = document.createElement('a');
            a.href = url;
            a.download = filename;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            setTimeout(() => URL.revokeObjectURL(url), 5000);
            updateStatus("📥 Скачивание...");
            setTimeout(() => updateStatus("✅ Готов"), 2000);
        }
    </script>
</body>
</html>
