<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEURA — нейросетевой ассистент</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at 20% 50%, #0a0a0a, #030303);
            min-height: 100vh;
            color: #ffffff;
        }
        .bg-gradient {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            background: linear-gradient(125deg, #0f0c29, #302b63, #24243e);
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            height: 100vh;
            display: flex;
            flex-direction: column;
            padding: 20px;
        }
        .header {
            text-align: center;
            padding: 20px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .logo-icon {
            font-size: 48px;
            background: linear-gradient(135deg, #a855f7, #ec4899);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .logo h1 {
            font-size: 32px;
            font-weight: 700;
            background: linear-gradient(135deg, #ffffff, #a855f7);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .message {
            display: flex;
            animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .message.user { justify-content: flex-end; }
        .message.bot { justify-content: flex-start; }
        .avatar {
            width: 36px;
            height: 36px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 12px;
            background: linear-gradient(135deg, #a855f7, #ec4899);
        }
        .message.user .avatar {
            order: 2;
            margin-right: 0;
            margin-left: 12px;
            background: rgba(255,255,255,0.1);
        }
        .message-content {
            max-width: 70%;
            padding: 12px 18px;
            border-radius: 18px;
            line-height: 1.5;
            font-size: 15px;
        }
        .user .message-content {
            background: linear-gradient(135deg, #a855f7, #ec4899);
            border-bottom-right-radius: 6px;
        }
        .bot .message-content {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            border-bottom-left-radius: 6px;
        }
        .download-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-top: 10px;
            padding: 8px 16px;
            background: linear-gradient(135deg, #22c55e, #16a34a);
            border: none;
            border-radius: 40px;
            color: white;
            font-weight: 600;
            font-size: 13px;
            cursor: pointer;
        }
        .typing-indicator {
            display: flex;
            gap: 6px;
            padding: 12px 18px;
        }
        .typing-indicator span {
            width: 8px;
            height: 8px;
            background: rgba(255,255,255,0.6);
            border-radius: 50%;
            animation: typing 1.4s infinite;
        }
        @keyframes typing {
            0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
            30% { transform: translateY(-8px); opacity: 1; }
        }
        .input-wrapper {
            padding: 20px;
            background: rgba(0,0,0,0.3);
            border-radius: 20px;
            margin-top: 10px;
        }
        .input-container {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 60px;
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 5px 5px 5px 20px;
        }
        .input-container input {
            flex: 1;
            background: transparent;
            border: none;
            padding: 14px 0;
            font-size: 16px;
            color: white;
            outline: none;
        }
        .input-container input::placeholder {
            color: rgba(255,255,255,0.4);
        }
        .input-container button {
            background: linear-gradient(135deg, #a855f7, #ec4899);
            border: none;
            width: 46px;
            height: 46px;
            border-radius: 50%;
            cursor: pointer;
        }
        .status {
            text-align: center;
            padding: 10px;
            font-size: 12px;
            color: rgba(255,255,255,0.5);
        }
        @media (max-width: 768px) {
            .message-content { max-width: 85%; font-size: 14px; }
            .logo h1 { font-size: 24px; }
        }
    </style>
</head>
<body>
    <div class="bg-gradient"></div>
    <div class="container">
        <div class="header">
            <div class="logo-icon"><i class="fas fa-brain"></i></div>
            <h1>NEURA</h1>
            <p style="font-size: 14px; opacity: 0.7;">нейросетевой ассистент</p>
        </div>

        <div class="messages" id="messages">
            <div class="message bot">
                <div class="avatar"><i class="fas fa-brain"></i></div>
                <div class="message-content">
                    ✨ Привет! Я NEURA — нейросетевой ассистент.<br><br>
                    📄 Напиши "Сделай документ про..." — создам Word<br>
                    🎬 Напиши "Сделай презентацию про..." — создам PowerPoint<br>
                    💬 Или просто спроси что угодно
                </div>
            </div>
        </div>

        <div class="input-wrapper">
            <div class="input-container">
                <input type="text" id="userInput" placeholder="Напишите сообщение..." onkeypress="handleKeyPress(event)">
                <button onclick="sendMessage()"><i class="fas fa-arrow-up"></i></button>
            </div>
            <div class="status" id="status">✅ Готов к работе</div>
        </div>
    </div>

    <script>
        const API_URL = "https://neura-production-ad43.up.railway.app";
        let currentDownloadUrl = null;

        function handleKeyPress(event) {
            if (event.key === 'Enter') sendMessage();
        }

        function addMessage(text, isUser, isDownload = false, downloadUrl = null, filename = null) {
            const messagesDiv = document.getElementById('messages');
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${isUser ? 'user' : 'bot'}`;
            
            const avatar = document.createElement('div');
            avatar.className = 'avatar';
            avatar.innerHTML = isUser ? '<i class="fas fa-user"></i>' : '<i class="fas fa-brain"></i>';
            
            const contentDiv = document.createElement('div');
            contentDiv.className = 'message-content';
            
            if (isDownload && downloadUrl && filename) {
                contentDiv.innerHTML = `
                    ${text.replace(/\n/g, '<br>')}
                    <button class="download-btn" onclick="downloadFile('${downloadUrl}', '${filename}')">
                        <i class="fas fa-download"></i> Скачать файл
                    </button>
                `;
            } else {
                contentDiv.innerHTML = text.replace(/\n/g, '<br>');
            }
            
            messageDiv.appendChild(avatar);
            messageDiv.appendChild(contentDiv);
            messagesDiv.appendChild(messageDiv);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        function showTyping() {
            const messagesDiv = document.getElementById('messages');
            const typingDiv = document.createElement('div');
            typingDiv.className = 'message bot';
            typingDiv.id = 'typingIndicator';
            typingDiv.innerHTML = `
                <div class="avatar"><i class="fas fa-brain"></i></div>
                <div class="message-content"><div class="typing-indicator"><span></span><span></span><span></span></div></div>
            `;
            messagesDiv.appendChild(typingDiv);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        function hideTyping() {
            const typing = document.getElementById('typingIndicator');
            if (typing) typing.remove();
        }

        function updateStatus(text, isError = false) {
            const statusDiv = document.getElementById('status');
            statusDiv.innerHTML = text;
            statusDiv.style.color = isError ? '#ef4444' : 'rgba(255,255,255,0.5)';
        }

        async function sendMessage() {
            const input = document.getElementById('userInput');
            const text = input.value.trim();
            if (!text) return;
            
            addMessage(text, true);
            input.value = '';
            
            const lowerText = text.toLowerCase();
            const wantsDoc = /(сделай|создай|напиши|сгенерируй).*(документ|ворд|docx|word)/i.test(lowerText);
            const wantsPPT = /(сделай|создай|сгенерируй).*(презентацию|преза|pptx|powerpoint|слайды)/i.test(lowerText);
            
            let fileType = null;
            if (wantsDoc) fileType = "docx";
            else if (wantsPPT) fileType = "pptx";
            
            showTyping();
            updateStatus("🤔 Думаю...");
            
            try {
                if (fileType) {
                    updateStatus(`📝 Создаю ${fileType === "docx" ? "документ" : "презентацию"}...`);
                    
                    const response = await fetch(`${API_URL}/generate`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ text: text, file_type: fileType })
                    });
                    
                    if (!response.ok) {
                        const error = await response.json();
                        throw new Error(error.detail || "Ошибка создания файла");
                    }
                    
                    const blob = await response.blob();
                    const url = URL.createObjectURL(blob);
                    const filename = `${fileType === "docx" ? "document" : "presentation"}_${Date.now()}.${fileType}`;
                    
                    hideTyping();
                    const fileTypeName = fileType === "docx" ? "документ Word" : "презентацию PowerPoint";
                    addMessage(`✅ Я создал ${fileTypeName} по вашему запросу!`, false, true, url, filename);
                    updateStatus("✅ Файл готов к скачиванию");
                    
                } else {
                    updateStatus("💬 Получаю ответ...");
                    
                    const response = await fetch(`${API_URL}/chat`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ text: text })
                    });
                    
                    if (!response.ok) throw new Error("Ошибка получения ответа");
                    
                    const data = await response.json();
                    hideTyping();
                    addMessage(data.response, false);
                    updateStatus("✅ Готов к работе");
                }
            } catch (error) {
                console.error("Ошибка:", error);
                hideTyping();
                addMessage(`❌ Ошибка: ${error.message}. Проверьте, запущен ли сервер.`, false);
                updateStatus("❌ Ошибка подключения", true);
            }
        }

        function downloadFile(url, filename) {
            const a = document.createElement('a');
            a.href = url;
            a.download = filename;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            setTimeout(() => URL.revokeObjectURL(url), 5000);
            updateStatus("📥 Скачивание началось...");
            setTimeout(() => updateStatus("✅ Готов к работе"), 3000);
        }
    </script>
</body>
</html>
