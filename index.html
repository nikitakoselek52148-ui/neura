<!DOCTYPE html>
<html>
<head>
    <title>NEURA</title>
    <meta charset="UTF-8">
</head>
<body>
    <h1>NEURA</h1>
    <input type="text" id="input" style="width: 300px; padding: 10px;">
    <button onclick="send()">Отправить</button>
    <div id="result"></div>

    <script>
        async function send() {
            const input = document.getElementById('input');
            const text = input.value;
            const result = document.getElementById('result');
            
            result.innerHTML = 'Отправка...';
            
            // Жестко прописанный URL
            const url = 'https://neura-production-ad43.up.railway.app/chat';
            
            try {
                const response = await fetch(url, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ text: text })
                });
                
                const data = await response.json();
                result.innerHTML = 'Ответ: ' + data.response;
            } catch (e) {
                result.innerHTML = 'Ошибка: ' + e.message;
            }
        }
    </script>
</body>
</html>
